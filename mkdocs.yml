site_name: NeuralMem
site_description: Memory as Infrastructure — Local-first, MCP-native agent memory
site_url: https://docs.neuralmem.dev
repo_url: https://github.com/chowen-zz/neuralmem
repo_name: chowen-zz/neuralmem

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 概念:
    - 记忆类型: concepts/memory-types.md
    - 检索策略: concepts/retrieval.md
    - 架构: concepts/architecture.md
  - 集成指南:
    - Claude Code: guides/claude-code.md
    - Cursor: guides/cursor.md
  - API 参考: api-reference.md
  - 企业版: enterprise.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
