<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuralMem</title>
  <style>
    body { width: 320px; margin: 0; padding: 0; font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }
    header { padding: 12px 16px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 8px; }
    header h1 { font-size: 16px; margin: 0; }
    .section { padding: 12px 16px; border-bottom: 1px solid #222; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px; background: #3b82f6; color: #fff; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
    .btn:hover { background: #2563eb; }
    .btn.secondary { background: #333; }
    .btn.secondary:hover { background: #444; }
    input[type="text"] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: #e0e0e0; box-sizing: border-box; }
    .memory-list { max-height: 180px; overflow-y: auto; }
    .memory-item { padding: 8px; border-radius: 4px; background: #1a1a1a; margin-bottom: 6px; cursor: pointer; }
    .memory-item:hover { background: #222; }
    .memory-item .title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .memory-item .url { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status { font-size: 12px; color: #888; text-align: center; padding: 4px; }
  </style>
</head>
<body>
  <header>
    <span>🧠</span>
    <h1>NeuralMem</h1>
  </header>

  <div class="section">
    <button id="btn-save" class="btn">Quick Save Page</button>
    <button id="btn-tweets" class="btn secondary">Capture Tweets</button>
  </div>

  <div class="section">
    <input type="text" id="search-input" placeholder="Search memories..." />
    <div id="search-status" class="status"></div>
  </div>

  <div class="section">
    <div style="font-size: 12px; color: #888; margin-bottom: 6px;">Recent Memories</div>
    <div id="recent-list" class="memory-list"></div>
    <div id="recent-status" class="status">Loading...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
